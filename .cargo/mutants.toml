# cargo-mutants configuration for holon workspace

exclude_globs = [
    "**/test_*.rs",
    "**/*_test.rs",
    "**/test_macro.rs",
    "tests/**",
    "examples/**"
]

timeout_multiplier = 10.0

# Only build and run the petri PBT test (lib is built implicitly as dependency)
additional_cargo_args = ["--test", "petri_e2e_pbt"]
additional_cargo_test_args = ["--test", "petri_e2e_pbt"]
