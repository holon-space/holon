# cargo-mutants configuration for holon

# Exclude test-related files from mutation
exclude_globs = [
    "**/test_*.rs",
    "**/*_test.rs",
    "**/test_macro.rs",
    "tests/**",
    "examples/**"
]

# Set timeout multiplier (default is 5x the baseline test time)
# If tests take a long time, you may want to increase this
timeout_multiplier = 10

# Number of parallel jobs
jobs = 4

# Only build lib + the petri PBT test (skip broken examples)
additional_cargo_args = ["--lib", "--test", "petri_e2e_pbt"]
additional_cargo_test_args = ["--test", "petri_e2e_pbt"]
