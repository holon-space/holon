[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # All transitive deps — no direct fix available
    "RUSTSEC-2024-0320",  # yaml-rust unmaintained (r3bl_tui → syntect)
    "RUSTSEC-2024-0384",  # instant unmaintained (transitive)
    "RUSTSEC-2024-0436",  # paste unmaintained (transitive)
    "RUSTSEC-2025-0057",  # fxhash unmaintained (transitive)
    "RUSTSEC-2023-0089",  # atomic-polyfill unmaintained (transitive)
    "RUSTSEC-2025-0052",  # bincode unmaintained (transitive)
    "RUSTSEC-2025-0141",  # async-std discontinued (transitive)
]

[licenses]
private = { ignore = true, registries = [] }
allow = [
    "MIT",
    "MIT-0",
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "BlueOak-1.0.0",
    "Unlicense",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
